<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{                   /* esto hace que todos los objetos no tengan separacion */
            padding: 0px;
            margin: 0px;
        }

        body{background-color: rgb(141, 141, 40);}
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative;      /* para centrar el div */
            margin: 0 auto;          /* para centrar el div */

            overflow: hidden;        /* muestra solo lo que haya dentro del contenedor  */
        }

        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute;  /* para que se mueva el div dentro del contenedor */
            top: -100px;
            right: -100px;

            animation: cuadrito 0.5s infinite linear;
        }

        @keyframes cuadrito {
            from{right: -100px; top:-100 ;}
            to{right: 500px; top:300}
            
        }

    </style>

</head>

<body>
    <h1><a href="index.html">volver</a></h1>
    <div class="contenedor">

        <div class="cuadrito"></div>

    </div>

</body>
</html>
