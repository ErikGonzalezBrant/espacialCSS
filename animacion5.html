<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{           
            padding: 0px;
            margin: 0px;
        }

        body{background-color: rgb(131, 131, 131);}

        .contenedor{
            width: 800px;
            height: 400px;
            border: 1px solid black;
            position: relative;      
            margin: 0 auto;        
            background-color: black;

            overflow: hidden;        
        }

        .nyancat{
            width: 100px;
            height: 100px;
            position: absolute;
            top: 50px;
            left: 450px;

            animation: nyancat 2s infinite linear;
        }

        @keyframes nyancat {    /* ESTO NO ES IA PROFE LO APRENDI */
        0% {
            transform: rotate(15deg);
            }
        25% {
            transform: rotate(0deg);
            }
        50% {
            transform: rotate(-15deg);
            }
        75%{
            transform: rotate(0deg);
        }
        100%{transform: rotate(15deg);}
        }
          
        .nyancat img{
            width: 100px;
            height: 100px;
        }

        .invencible{
            position: absolute;
            top: 200px;
            left: 100px;

            animation: invencible 2s infinite linear;
        }

        @keyframes invencible {    /* ESTO NO ES IA PROFE LO APRENDI */
        0% {
            transform: rotate(5deg);
            }
        25% {
            transform: rotate(0deg);
            }
        50% {
            transform: rotate(-5deg);
            }
        75%{
            transform: rotate(0deg);
        }
        100%{transform: rotate(5deg);}
        }
          
        .invencible img{
            width: 400px;
            height: 200px;
        }

        .c1{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 30px;
            left: -10px;
            background-color: rgb(255, 255, 255);

            animation: c1 2s infinite linear;
        }

        @keyframes c1 {
            from{left: -10px}
            to{left: 1000px}
        }

        .c2{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 130px;
            left: -10px;
            background-color: white;

            animation: c2 1.2s infinite linear;
        }

        @keyframes c2 {
            from{left: -10px}
            to{left: 1000px}
        }

        .c3{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 230px;
            left: -10px;
            background-color: rgb(255, 238, 0);

            animation: c2 5s infinite linear;

        }

        @keyframes c3 {
            from{left: -10px}
            to{left: 1000px}
        }

        .c4{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 330px;
            left: -10px;
            background-color: rgb(255, 238, 0);

            animation: c4 1.5s infinite linear;

        }

        @keyframes c4 {
            from{left: -10px}
            to{left: 1000px}
        }

        .c5{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 200px;
            left: -10px;
            background-color: rgb(255, 255, 255);

            animation: c5 3.5s infinite linear;

        }

        @keyframes c5 {
            from{left: -10px}
            to{left: 1000px}
        }

        .c6{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 100px;
            left: -10px;
            background-color: rgb(255, 255, 255);

            animation: c6 0.5s 3s infinite linear;

        }

        @keyframes c6 {
            from{left: -10px}
            to{left: 1000px}
        }
        .c7{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 10px;
            left: -10px;
            background-color: rgb(255, 255, 255);

            animation: c7 6.5s 3s infinite linear;

        }

        @keyframes c7 {
            from{left: -10px}
            to{left: 1000px}
        }
        .c8{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 310px;
            left: -10px;
            background-color: rgb(255, 255, 255);

            animation: c8 5.7s infinite linear;

        }

        @keyframes c8 {
            from{left: -10px}
            to{left: 1000px}
        }
        .c9{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 310px;
            left: -10px;
            background-color: rgb(255, 255, 255);

            animation: c9 5.7s infinite linear;

        }

        @keyframes c9 {
            from{left: -10px}
            to{left: 1000px}
        }
        .c10{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 260px;
            left: -10px;
            background-color: rgb(255, 255, 255);

            animation: c10 3.7s infinite linear;

        }

        @keyframes c10 {
            from{left: -10px}
            to{left: 1000px}
        }


    </style>

</head>

<body>
    <h1><a href="index.html">volver</a></h1>

    <div class="contenedor">

        <div class="c1"></div>
        <div class="c2"></div>
        <div class="c3"></div>
        <div class="c4"></div>
        <div class="c5"></div>
        <div class="c6"></div>
        <div class="c7"></div>
        <div class="c8"></div>
        <div class="c9"></div>
        <div class="c10"></div>

        <div class="nyancat">

            <img src="img/nyancat2.gif">

        </div>

        <div class="invencible">

            <img src="img/invencible.png">

        </div>

    </div>

</body>
</html>
